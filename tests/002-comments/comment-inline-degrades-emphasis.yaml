id: comment-inline-degrades-emphasis
section: "2.2"
description: "`##` is opaque to other delimiters; an unclosed `**` opener before it degrades to literal text; payload stored in reflection"

input: |
  **bold ## tail

ast:
  - type: Paragraph
    children:
      - type: Text
        value: "**bold "
    reflection:
      - line: 0
        text: "tail"
