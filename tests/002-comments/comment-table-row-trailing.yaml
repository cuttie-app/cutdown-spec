id: comment-table-row-trailing
section: "4.8"
description: "Trailing `## comment` after a row's content bubbles to Table.reflection at the row's line offset, NOT to any Row or cell"

input: |
  | AA | BB | ## what is this?

ast:
  - type: Table
    kind: simple
    reflection:
      - line: 0
        text: "what is this?"
    body:
      - type: Row
        children:
          - type: Cell
            children:
              - type: Text
                value: "AA"
          - type: Cell
            children:
              - type: Text
                value: "BB"
