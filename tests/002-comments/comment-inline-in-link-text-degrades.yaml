id: comment-inline-in-link-text-degrades
section: "2.2"
description: "`##` inside link text swallows `](url)` to EOL; `[` opener has no closer and degrades to literal; payload stored in reflection"

input: |
  [text ## here](url)

ast:
  - type: Paragraph
    children:
      - type: Text
        value: "[text "
    reflection:
      - line: 0
        text: "here](url)"
