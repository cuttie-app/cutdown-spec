id: comment-inline-after-attrs-transparent
section: "2.6"
description: "`##` payload stored in reflection; trailing `{attrs}` still claim their scope-chain slot unaffected"

input: |
  some text {.p} ## tail comment

ast:
  - type: Paragraph
    attributes:
      - key: class
        value: [p]
    children:
      - type: Text
        value: "some text "
    reflection:
      - line: 0
        text: "tail comment"
