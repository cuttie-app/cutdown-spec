id: comment-block-in-list-item
section: "2.3"
description: "CommentBlock is recognized inside a ListItem at the item's effective column"

input: |
  - item one
    ###
    todo
    ###
  - item two

ast:
  - type: List
    kind: bullet
    children:
      - type: ListItem
        children:
          - type: Text
            value: "item one"
          - type: CommentBlock
            text: "todo\n"
      - type: ListItem
        children:
          - type: Text
            value: "item two"
