id: comment-table-delim-row-trailing
section: "4.8"
description: "Trailing `##` on header row and delimiter row both bubble to Table.reflection at their respective line offsets"

input: |
  | Head A | Head B | ## header note
  | ------ | ------ | ## delim note
  | AA     | BB     |

ast:
  - type: Table
    kind: gfm
    reflection:
      - line: 0
        text: "header note"
      - line: 1
        text: "delim note"
    head:
      - type: Row
        children:
          - type: Cell
            children:
              - type: Text
                value: "Head A"
          - type: Cell
            children:
              - type: Text
                value: "Head B"
    body:
      - type: Row
        children:
          - type: Cell
            children:
              - type: Text
                value: "AA"
          - type: Cell
            children:
              - type: Text
                value: "BB"
