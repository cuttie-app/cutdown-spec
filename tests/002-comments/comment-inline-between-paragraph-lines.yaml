id: comment-inline-between-paragraph-lines
section: "2.2"
description: "A standalone `##` line between paragraph continuation lines closes the active Paragraph and attaches to it; the next line starts a new Paragraph"

input: |
  First line
  ## comment between
  Second line

ast:
  - type: Paragraph
    children:
      - type: Text
        value: "First line"
    reflection:
      - line: 1
        text: "comment between"
  - type: Paragraph
    children:
      - type: Text
        value: "Second line"
