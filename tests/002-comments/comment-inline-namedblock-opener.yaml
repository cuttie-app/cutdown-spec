id: comment-inline-namedblock-opener
section: "2.6"
description: "Trailing `##` on a NamedBlock opener bubbles to NamedBlock.reflection; attrs claim the block; body is clean"

input: |
  :::callout {.warn} ## opener note
  content
  :::

ast:
  - type: NamedBlock
    name: callout
    attributes:
      - key: class
        value: [warn]
    reflection:
      - line: 0
        text: "opener note"
    children:
      - type: Paragraph
        children:
          - type: Text
            value: "content"
