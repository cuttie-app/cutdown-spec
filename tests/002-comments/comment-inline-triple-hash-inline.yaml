id: comment-inline-triple-hash-inline
section: "2.2"
description: "Run of 3 `###` at inline position is `##` (line comment opener) + literal `#` as first char of payload text"

input: |
  text ### inline triple

ast:
  - type: Paragraph
    children:
      - type: Text
        value: "text "
    reflection:
      - line: 0
        text: "# inline triple"
