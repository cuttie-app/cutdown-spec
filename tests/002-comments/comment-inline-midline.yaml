id: comment-inline-midline
section: "2.2"
description: "`##` is recognized mid-line; preceding text stays in children, payload stored in block reflection"

input: |
  foo bar ## trailing comment

ast:
  - type: Paragraph
    children:
      - type: Text
        value: "foo bar "
    reflection:
      - line: 0
        text: "trailing comment"
