id: code-block-inside-listitem
section: "4.4"
description: CodeBlock inside a list item is legal; list item's base offset (2 spaces) is stripped from content lines

input: |
  - item

    ```js
    const x = 1
    ```

ast:
  - type: List
    kind: "bullet"
    loose: true
    children:
      - type: ListItem
        children:
          - type: Paragraph
            children:
              - type: Text
                value: item
          - type: CodeBlock
            language: js
            raw: const x = 1
