id: math-block-inside-listitem
section: "4.5"
description: MathBlock inside a list item is legal; list item's base offset is stripped from content lines

input: |
  - item

    $$$
    x^2 + y^2
    $$$

ast:
  - type: List
    kind: "bullet"
    loose: true
    children:
      - type: ListItem
        children:
          - type: Paragraph
            children:
              - type: Text
                value: item
          - type: MathBlock
            raw: "x^2 + y^2"
