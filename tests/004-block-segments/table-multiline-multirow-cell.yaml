id: table-multiline-multirow-cell
section: "4.8"
description: "Two `|` lines between consecutive `+` rows form one logical row; cell content is soft-joined across lines"

input: |
  +--------------------+--------------------+
  | First line col A   | First line col B   |
  | Second line col A  | Second line col B  |
  +--------------------+--------------------+

ast:
  - type: Table
    kind: multiline
    rows:
      - type: Row
        children:
          - type: Cell
            row: 0
            column: 0
            children:
              - type: Paragraph
                children:
                  - type: Text
                    value: "First line col A Second line col A"
          - type: Cell
            row: 0
            column: 1
            children:
              - type: Paragraph
                children:
                  - type: Text
                    value: "First line col B Second line col B"
    columns:
      - type: Column
      - type: Column
