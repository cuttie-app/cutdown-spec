id: task-item-checked
section: "4.7.2"
description: "Both - [x] and - [X] produce TaskItem with checked: true"

input: |
  - [x] Write spec
  - [X] Also checked

ast:
  - type: List
    kind: "checklist"
    loose: false
    children:
      - type: TaskItem
        checked: true
        children:
          - type: Text
            value: Write spec
      - type: TaskItem
        checked: true
        children:
          - type: Text
            value: Also checked
