id: list-mixed-task-numeric
section: "4.7"
description: "Checklist followed by a numbered marker: task items form kind=checklist; numeric item starts a new kind=numbered List"

input: |
  - [ ] Task item first
  1. Numeric becomes unordered

ast:
  - type: List
    kind: "checklist"
    start: null
    children:
      - type: TaskItem
        checked: false
        children:
          - type: Text
            value: Task item first
  - type: List
    kind: "numbered"
    start: 1
    children:
      - type: ListItem
        children:
          - type: Text
            value: Numeric becomes unordered
