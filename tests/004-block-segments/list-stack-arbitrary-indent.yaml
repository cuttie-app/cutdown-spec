id: list-stack-arbitrary-indent
section: "4.7"
description: Stack model resolves arbitrary indentation; any col > parent.col nests one level regardless of delta; col <= current.col pops to sibling

input: |
      - item A
          - item B
      - item C

ast:
  - type: List
    kind: "bullet"
    children:
      - type: ListItem
        children:
          - type: Text
            value: item A
          - type: List
            kind: "bullet"
            children:
              - type: ListItem
                children:
                  - type: Text
                    value: item B
      - type: ListItem
        children:
          - type: Text
            value: item C
