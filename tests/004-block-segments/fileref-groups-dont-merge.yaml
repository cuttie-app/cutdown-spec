id: fileref-groups-dont-merge
section: "4.12"
description: FileRef lines from different known groups do not merge into the same FileRefGroup

input: |
  /a.png
  /a.jpg
  /b.mp4
  /c.mp4

ast:
  - type: FileRefGroup
    group: image
    children:
      - type: FileRef
        path: /a.png
        query: ''
        fragment: ''
      - type: FileRef
        path: /a.jpg
        query: ''
        fragment: ''
  - type: FileRefGroup
    group: video
    children:
      - type: FileRef
        path: /b.mp4
        query: ''
        fragment: ''
      - type: FileRef
        path: /c.mp4
        query: ''
        fragment: ''
