id: list-mixed-numeric-task
section: "4.7"
description: "Numbered list followed by a task item: numeric items form kind=numbered; task item starts a new kind=checklist List"

input: |
  1. First ordered item
  - [ ] Task item in ordered list

ast:
  - type: List
    kind: "numbered"
    loose: false
    start: 1
    children:
      - type: ListItem
        children:
          - type: Text
            value: First ordered item
  - type: List
    kind: "checklist"
    loose: false
    start: null
    children:
      - type: TaskItem
        checked: false
        children:
          - type: Text
            value: Task item in ordered list
