id: quote-block-with-ordered-list
section: "4.6"
description: An ordered list inside a QuoteBlock is parsed normally; consecutive > lines with ordered markers form a tight ordered List

input: |
  > 1. first
  > 2. second

ast:
  - type: QuoteBlock
    children:
      - type: List
        ordered: true
        loose: false
        start: 1
        children:
          - type: ListItem
            children:
              - type: Text
                value: first
          - type: ListItem
            children:
              - type: Text
                value: second
