id: task-item-mixed-list
section: "4.7"
description: "TaskItem and ListItem children cannot mix; encountering a plain item after task items closes the checklist and opens a new bullet List"

input: |
  - [ ] Buy milk
  - [x] Write spec
  - plain item

ast:
  - type: List
    kind: "checklist"
    start: null
    loose: false
    children:
      - type: TaskItem
        checked: false
        children:
          - type: Text
            value: Buy milk
      - type: TaskItem
        checked: true
        children:
          - type: Text
            value: Write spec
  - type: List
    kind: "bullet"
    loose: false
    children:
      - type: ListItem
        children:
          - type: Text
            value: plain item
