id: quote-block-consecutive
section: "4.6"
description: A blank line between > blocks terminates the first QuoteBlock and starts a new one; they do not merge

input: |
  > alpha

  > beta

ast:
  - type: QuoteBlock
    children:
      - type: Paragraph
        children:
          - type: Text
            value: alpha
  - type: QuoteBlock
    children:
      - type: Paragraph
        children:
          - type: Text
            value: beta
