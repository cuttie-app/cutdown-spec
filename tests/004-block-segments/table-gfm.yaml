id: table-gfm
section: "4.8"
description: GFM table; `+:---+` header separator sets alignment and marks preceding rows as type Header; subsequent rows are type Row

input: |
  | Name  | Score |
  +:------+------:+
  | Alice |    42 |
  | Bob   |    17 |

ast:
  - type: Table
    kind: gfm
    rows:
      - type: Header
        children:
          - type: Cell
            row: 0
            column: 0
            children:
              - type: Text
                value: Name
          - type: Cell
            row: 0
            column: 1
            children:
              - type: Text
                value: Score
      - type: Row
        children:
          - type: Cell
            row: 1
            column: 0
            children:
              - type: Text
                value: Alice
          - type: Cell
            row: 1
            column: 1
            children:
              - type: Text
                value: "42"
      - type: Row
        children:
          - type: Cell
            row: 2
            column: 0
            children:
              - type: Text
                value: Bob
          - type: Cell
            row: 2
            column: 1
            children:
              - type: Text
                value: "17"
    columns:
      - type: Column
        align: left
      - type: Column
        align: right
