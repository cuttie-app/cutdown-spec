id: escape-thematic-break-opener
section: "8.2"
description: "`\\---` at line start → literal `---`; suppresses ThematicBreak AND its page-break side effect. Whole sample stays in one Page, joined into one Paragraph (no blank-line separator)."

input: |
  para before
  \---
  para after

ast:
  - type: Paragraph
    children:
      - type: Text
        value: "para before --- para after"
