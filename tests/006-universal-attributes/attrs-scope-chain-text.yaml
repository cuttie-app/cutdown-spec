id: attrs-scope-chain-text
section: "6.2"
description: "Text list items: two trailing {} distribute right-to-left — last to List, preceding to ListItem"

input: |
  - text {.a}{.b}

ast:
  - type: List
    kind: "bullet"
    loose: false
    children:
      - type: ListItem
        children:
          - type: Text
            value: text
        attributes:
          - key: class
            value: [a]
    attributes:
      - key: class
        value: [b]
