id: attrs-scope-chain-text-3
section: "6.2"
description: "Three trailing {} on text list item: last to List, middle to ListItem, first dropped (Text has no attrs)"

input: |
  - text {.a}{.b}{.c}

ast:
  - type: List
    kind: "bullet"
    ordered: false
    loose: false
    children:
      - type: ListItem
        children:
          - type: Text
            value: text
        attributes:
          - key: class
            value: [b]
    attributes:
      - key: class
        value: [c]
