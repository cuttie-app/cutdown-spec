id: attrs-scope-chain-span-1
section: "6.2"
description: "Single trailing {} on list item with Span: goes to List (ListItem and Span get nothing)"

input: |
  - ::sp {.a}

ast:
  - type: List
    ordered: false
    loose: false
    children:
      - type: ListItem
        children:
          - type: Span
            name: sp
    attributes:
      - key: class
        value: [a]
