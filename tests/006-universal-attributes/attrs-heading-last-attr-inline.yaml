id: attrs-heading-last-attr-inline
section: "6.2"
description: "Last-attr rule: last {} on heading line goes to Section; earlier {} attaches to preceding inline"

input: |
  = Heading **bold**{.b} {#h}

ast:
  - type: Section
    level: 1
    heading:
      - type: Text
        value: "Heading "
      - type: Emphasis
        children:
          - type: Text
            value: bold
        attributes:
          - key: class
            value: [b]
    attributes:
      - key: id
        value: h
