id: attrs-scope-chain-span-noop
section: "6.2"
description: "Empty {} as last token is no-op on List; preceding {.a} goes to ListItem"

input: |
  - ::sp {.a}{}

ast:
  - type: List
    kind: "bullet"
    ordered: false
    loose: false
    children:
      - type: ListItem
        children:
          - type: Span
            name: sp
        attributes:
          - key: class
            value: [a]
