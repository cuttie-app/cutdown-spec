id: caption-blank-line-breaks-binding
section: "6.5"
description: "A blank line between a captionable block and a `^ ` line breaks the binding; the `^ ` line is orphaned (CDN-0008) and emitted as a Paragraph"

input: |
  | col |

  ^ Caption text

ast:
  - type: Table
    kind: gfm
    rows:
      - type: Row
        children:
          - type: Cell
            children:
              - type: Text
                value: col
  - type: Paragraph
    children:
      - type: Text
        value: "^ Caption text"

diagnostics:
  - code: CDN-0008
    level: warning
