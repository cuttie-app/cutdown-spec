id: attrs-scope-chain-span-empty
section: "6.2"
description: "Empty {} on list item with Span: claims List slot but assigns nothing (no-op)"

input: |
  - ::sp {}

ast:
  - type: List
    ordered: false
    loose: false
    children:
      - type: ListItem
        children:
          - type: Span
            name: sp
