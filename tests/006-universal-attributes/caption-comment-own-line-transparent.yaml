id: caption-comment-own-line-transparent
section: "6.5"
description: "A standalone `## comment` line between a captionable block and a `^ ` line does not break caption binding — the payload attaches to the Table's reflection; no sibling node is emitted"

input: |
  | col |
  ## editorial note
  ^ Caption text

ast:
  - type: Table
    kind: gfm
    caption:
      - type: Text
        value: "Caption text"
    reflection:
      - line: 2
        text: "editorial note"
    rows:
      - type: Row
        children:
          - type: Cell
            children:
              - type: Text
                value: col
