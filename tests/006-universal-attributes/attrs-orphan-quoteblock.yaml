id: attrs-orphan-quoteblock
section: "6.3"
description: "Leading {attrs} in QuoteBlock content has no preceding element — orphan, emitted as literal text; trailing {attrs} attaches to QuoteBlock"

input: |
  > {.class} content

  > content {.class}

ast:
  - type: QuoteBlock
    children:
      - type: Paragraph
        children:
          - type: Text
            value: "{.class} content"

  - type: QuoteBlock
    children:
      - type: Paragraph
        children:
          - type: Text
            value: content
    attributes:
      - key: class
        value: [class]
