id: attrs-scope-chain-fileref-noop
section: "6.2"
description: "Empty {} as last token is no-op on FileRefGroup; preceding {.a} goes to FileRef"

input: |
  /img.png {.a}{}

ast:
  - type: FileRefGroup
    group: image
    children:
      - type: FileRef
        path: /img.png
        query: ''
        fragment: ''
        attributes:
          - key: class
            value: [a]
