id: cdn-0011-orphaned-scope-chain
section: "6.2"
description: "Three {} tokens on a 2-slot list context; front token has no slot and is discarded; no warning (CDN-0011 should not emitted)"

input: |
  - text {.a}{.b}{.c}

ast:
  - type: List
    kind: "bullet"
    attributes:
      - key: class
        value: [c]
    children:
      - type: ListItem
        attributes:
          - key: class
            value: [b]
        children:
          - type: Text
            value: text
