id: cdn-0007-delim-row-attrs-dropped
section: "4.8"
description: "`{attrs}` on a `+:---+` header separator row are valid and go to Table; alignment is also extracted; no diagnostic emitted"

input: |
  | Head A | Head B |
  +:-------+-------:+ {.green}
  | AA     | BB     |

ast:
  - type: Table
    kind: gfm
    attributes:
      - key: class
        value: [green]
    columns:
      - type: Column
        align: left
      - type: Column
        align: right
    rows:
      - type: Header
        children:
          - type: Cell
            children:
              - type: Text
                value: "Head A"
          - type: Cell
            children:
              - type: Text
                value: "Head B"
      - type: Row
        children:
          - type: Cell
            children:
              - type: Text
                value: "AA"
          - type: Cell
            children:
              - type: Text
                value: "BB"
