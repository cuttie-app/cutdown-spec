id: quote-block-thematic-break
section: "9.6"
description: ThematicBreak inside a QuoteBlock emits a ThematicBreak node without creating a new Page; blank lines (> alone) separate it from adjacent paragraphs

input: |
  > para
  >
  > ---
  >
  > after

ast:
  - type: QuoteBlock
    children:
      - type: Paragraph
        children:
          - type: Text
            value: para
      - type: ThematicBreak
      - type: Paragraph
        children:
          - type: Text
            value: after
