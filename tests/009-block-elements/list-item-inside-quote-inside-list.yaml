id: list-item-inside-quote-inside-list
# section: "9.4"
# description: CodeBlock inside a list item is legal; list item's base offset (2 spaces) is stripped from content lines

input: |
  - > - item

ast:
  - type: List
    loose: true
    children:
      - type: ListItem
        children:
          - type: QuoteBlock
            children:
              - type: List
                loose: true
                children:
                  - type: ListItem
                    value: item
