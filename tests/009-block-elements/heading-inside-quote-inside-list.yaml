id: heading-inside-quote-inside-list
section: "9.7"
description: A heading inside a QuoteBlock inside a list item is legal; the outer list is tight (single item, no blank lines)

input: |
  - > = Heading item

ast:
  - type: List
    loose: false
    children:
      - type: ListItem
        children:
          - type: QuoteBlock
            children:
              - type: Section
                level: 1
                heading:
                  - type: Text
                    value: Heading item
