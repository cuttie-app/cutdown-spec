id: quote-inline-cross-nesting
section: "5.8"
description: Cross-kind nesting is allowed; single QuoteInline inside double

input: |
  ""'' inner ''""

ast:
  - type: Paragraph
    children:
      - type: QuoteInline
        kind: double
        children:
          - type: QuoteInline
            kind: single
            children:
              - type: Text
                value: inner
