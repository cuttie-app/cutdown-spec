id: attrs-heading-last-attr-empty
section: "5.2"
description: "Empty {} as last token explicitly assigns no attrs to Section; earlier {} attaches to inline"

input: |
  = Heading **bold**{.b} {}

ast:
  - type: Section
    level: 1
    heading:
      - type: Text
        value: "Heading "
      - type: Emphasis
        children:
          - type: Text
            value: bold
        attributes:
          - key: class
            value: [b]
